<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <h2>✓ TaskMaster</h2>
            </div>
            <ul class="navbar-menu">
                <li><a href="#home" class="nav-link active">Home</a></li>
                <li><a href="#tasks" class="nav-link">Tasks</a></li>
                <li><a href="#settings" class="nav-link">Settings</a></li>
            </ul>
            <div class="navbar-stats">
                <span class="stat-item">Tasks: <span id="totalTasks">1</span></span>
                <span class="stat-item">Done: <span id="completedTasks">0</span></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>📝 My Todo List</h1>
        
        <div class="toolbar">
            <button class="toolbar-btn clear-btn" onclick="clearCompleted()">🗑️ Clear Completed</button>
            <button class="toolbar-btn export-btn" onclick="exportTasks()">📥 Export</button>
            <button class="toolbar-btn import-btn" onclick="importTasks()">📤 Import</button>
            <button class="toolbar-btn theme-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>
        
        <div class="input-container">
            <input type="text" id="todoInput" placeholder="Add a new task...">
            <button onclick="addTodo()">Add</button>
        </div>
        
        <ul id="todoList">
            <li>
                <span class="todo-text">Learn Git branching</span>
                <div class="todo-actions">
                    <button class="complete-btn" onclick="toggleComplete(this)">✓</button>
                    <button class="delete-btn" onclick="deleteTodo(this)">✕</button>
                </div>
            </li>
        </ul>
    </div>
    
    <script>
        function updateStats() {
            const totalItems = document.querySelectorAll('#todoList li').length;
            const completedItems = document.querySelectorAll('#todoList li.completed').length;
            document.getElementById('totalTasks').textContent = totalItems;
            document.getElementById('completedTasks').textContent = completedItems;
        }
        
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            
            if (text === '') return;
            
            const list = document.getElementById('todoList');
            const li = document.createElement('li');
            
            li.innerHTML = `
                <span class="todo-text">${escapeHtml(text)}</span>
                <div class="todo-actions">
                    <button class="complete-btn" onclick="toggleComplete(this)">✓</button>
                    <button class="delete-btn" onclick="deleteTodo(this)">✕</button>
                </div>
            `;
            
            list.appendChild(li);
            input.value = '';
            input.focus();
            updateStats();
        }
        
        function toggleComplete(btn) {
            const li = btn.closest('li');
            li.classList.toggle('completed');
            updateStats();
        }
        
        function deleteTodo(btn) {
            const li = btn.closest('li');
            li.classList.add('deleting');
            setTimeout(() => {
                li.remove();
                updateStats();
            }, 300);
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        document.getElementById('todoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTodo();
            }
        });
        
        function clearCompleted() {
            const completedItems = document.querySelectorAll('#todoList li.completed');
            completedItems.forEach(item => {
                item.classList.add('deleting');
                setTimeout(() => {
                    item.remove();
                    updateStats();
                }, 300);
            });
        }
        
        function exportTasks() {
            const tasks = [];
            document.querySelectorAll('#todoList li').forEach(li => {
                const text = li.querySelector('.todo-text').textContent;
                const completed = li.classList.contains('completed');
                tasks.push({ text, completed });
            });
            
            const dataStr = JSON.stringify(tasks, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'tasks.json';
            link.click();
            URL.revokeObjectURL(url);
        }
        
        function importTasks() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const tasks = JSON.parse(event.target.result);
                        const list = document.getElementById('todoList');
                        list.innerHTML = '';
                        
                        tasks.forEach(task => {
                            const li = document.createElement('li');
                            if (task.completed) li.classList.add('completed');
                            
                            li.innerHTML = `
                                <span class="todo-text">${escapeHtml(task.text)}</span>
                                <div class="todo-actions">
                                    <button class="complete-btn" onclick="toggleComplete(this)">✓</button>
                                    <button class="delete-btn" onclick="deleteTodo(this)">✕</button>
                                </div>
                            `;
                            list.appendChild(li);
                        });
                        updateStats();
                    } catch(err) {
                        alert('Error importing file: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        
        // Load dark mode preference on page load
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
